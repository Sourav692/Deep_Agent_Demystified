<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0B1426; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  background: #0B1426; font-family: Arial, sans-serif;
  display: flex; color: #F1F5F9;
}
.left-band {
  width: 18pt; height: 405pt; background: #7C3AED;
}
.accent-block {
  position: absolute; top: 0; right: 0;
  width: 280pt; height: 405pt; background: #111B33;
}
.cyan-corner {
  position: absolute; top: 0; right: 0;
  width: 0; height: 0;
  border-top: 80pt solid #06B6D4;
  border-left: 80pt solid transparent;
}
.content {
  position: absolute; left: 60pt; top: 70pt;
  width: 380pt;
}
.eyebrow {
  font-size: 11pt; letter-spacing: 4pt; color: #06B6D4;
  font-weight: bold; margin: 0 0 12pt 0;
}
.title {
  font-size: 40pt; font-weight: bold; color: #F1F5F9;
  margin: 0; line-height: 1.05;
}
.title-accent { color: #7C3AED; }
.divider {
  width: 70pt; height: 4pt; background: #7C3AED;
  margin: 18pt 0 14pt 0;
}
.subtitle {
  font-size: 14pt; color: #CBD5E1; margin: 0;
  line-height: 1.4; font-weight: normal;
}
.footer {
  position: absolute; left: 60pt; bottom: 28pt;
  display: flex; align-items: center; width: 380pt;
}
.footer-tag {
  font-size: 10pt; color: #64748B; letter-spacing: 2pt;
  margin: 0;
}
.footer-dot {
  width: 6pt; height: 6pt; background: #06B6D4;
  border-radius: 50%; margin: 0 12pt;
}
.right-meta {
  position: absolute; right: 40pt; top: 70pt;
  width: 220pt;
}
.meta-line {
  width: 100%; height: 1pt; background: #243049;
  margin: 12pt 0;
}
.meta-label {
  font-size: 9pt; color: #64748B; letter-spacing: 2pt;
  margin: 0 0 4pt 0;
}
.meta-value {
  font-size: 14pt; color: #F1F5F9; margin: 0;
  font-weight: bold;
}
</style>
</head>
<body>
<div class="left-band"></div>
<div class="accent-block"></div>
<div class="cyan-corner"></div>

<div class="content">
  <p class="eyebrow">SYNAPTIC COMMAND // DEEP AGENT</p>
  <h1 class="title">Beyond <span class="title-accent">LangGraph</span><br>Engineering Deep Agents</h1>
  <div class="divider"></div>
  <p class="subtitle">From multi-agent orchestration to harness-driven intelligence.</p>
</div>

<div class="right-meta">
  <p class="meta-label">FRAMEWORK</p>
  <p class="meta-value">deepagents</p>
  <div class="meta-line"></div>
  <p class="meta-label">RUNTIME</p>
  <p class="meta-value">Claude Opus 4.6</p>
  <div class="meta-line"></div>
  <p class="meta-label">PLATFORM</p>
  <p class="meta-value">Databricks Apps</p>
</div>

<div class="footer">
  <p class="footer-tag">SOURAV BANERJEE</p>
  <div class="footer-dot"></div>
  <p class="footer-tag">2026</p>
</div>
</body>
</html>
