name: Deploy Databricks App

on:
  push:
    branches:
      - dev
      - stage
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'dev' && 'dev' || github.ref_name == 'stage' && 'staging' || 'prod' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Build frontend assets
        working-directory: app/frontend
        run: |
          npm ci
          npm run build

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Resolve bundle target
        id: target
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "name=dev" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "stage" ]; then
            echo "name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "name=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle deploy
        env:
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: databricks bundle deploy -t ${{ steps.target.outputs.name }}

      - name: Bundle run (start app)
        env:
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: databricks bundle run deep_agent_memory -t ${{ steps.target.outputs.name }}
