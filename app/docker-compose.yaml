version: "3.8"

services:
  deep-agent:
    build:
      context: ..
      dockerfile: app/Dockerfile
    container_name: deep_agent
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - USE_SANDBOX=false

  # For local development: run frontend and backend separately
  # Frontend dev server (with API proxy to backend):
  #   cd frontend && npm run dev
  # Backend:
  #   cd backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload
